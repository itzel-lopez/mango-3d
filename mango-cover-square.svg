<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#0E0C18"/>
      <stop offset="100%" stop-color="#1C1828"/>
    </linearGradient>

    <!-- Mango fruit gradient -->
    <linearGradient id="mango" x1="0.85" y1="0.02" x2="0.15" y2="0.98">
      <stop offset="0%"   stop-color="#B71C1C"/>
      <stop offset="38%"  stop-color="#E64A19"/>
      <stop offset="72%"  stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </linearGradient>

    <!-- Warm radial glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFB800" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1000" height="1000" fill="url(#bg)"/>

  <!-- ── Decorative wireframe shapes ── -->
  <!-- Box, top-right -->
  <g opacity="0.07" stroke="#FFB800" stroke-width="1.5" fill="none">
    <polygon points="900,55 975,96 975,205 900,246 825,205 825,96"/>
    <line x1="900" y1="55"  x2="900" y2="246"/>
    <line x1="825" y1="96"  x2="975" y2="96"/>
  </g>
  <!-- Torus, bottom-left -->
  <g opacity="0.07" stroke="#FFB800" fill="none" transform="rotate(-18 100 930)">
    <ellipse cx="100" cy="930" rx="80" ry="21" stroke-width="2"/>
    <ellipse cx="100" cy="930" rx="44" ry="12" stroke-width="1.4"/>
  </g>
  <!-- Sphere, top-left -->
  <g opacity="0.06" stroke="#FFB800" fill="none">
    <circle  cx="90"  cy="82" r="52"  stroke-width="1.4"/>
    <ellipse cx="90"  cy="82" rx="22" ry="52"  stroke-width="1"/>
    <ellipse cx="90"  cy="82" rx="52" ry="17"  stroke-width="1"/>
  </g>
  <!-- Cone, bottom-right -->
  <g opacity="0.06" stroke="#FFB800" fill="none">
    <line x1="930" y1="840" x2="880" y2="1000" stroke-width="1.4"/>
    <line x1="930" y1="840" x2="980" y2="1000" stroke-width="1.4"/>
    <ellipse cx="930" cy="997" rx="50" ry="12" stroke-width="1.2"/>
  </g>

  <!-- ── Warm glow behind mango mark ── -->
  <ellipse cx="500" cy="345" rx="270" ry="270" fill="url(#glow)"/>

  <!-- ── Large Mango Mark ── -->
  <!-- viewBox 0 0 20 24, scale×16. Centre (10,12.25)→(160,196). -->
  <!-- translate so centre lands at (500,345): tx=340, ty=149      -->
  <g transform="translate(340, 149) scale(16)">
    <!-- Fruit body -->
    <path d="M10 4C13.5 4 16 7.5 16 12C16 17 13.5 20 10 20.5C6.5 20 4 17 4 12C4 7.5 6.5 4 10 4Z"
          fill="url(#mango)"/>
    <!-- Sheen highlight -->
    <ellipse cx="8.3" cy="9.8" rx="1.8" ry="2.6" fill="white" opacity="0.2"/>
    <!-- Stem -->
    <path d="M10 4C10 2.5 11.1 1.7 12.6 2.2"
          stroke="#2D7A3A" stroke-width="1.3" stroke-linecap="round" fill="none"/>
    <!-- Leaf -->
    <path d="M10 4C9.2 2 6.5 0.5 4.5 1.5C5.5 3.5 7.5 3.8 10 4Z" fill="#2D7A3A"/>
    <!-- Leaf midrib -->
    <path d="M9.7 3.8C8 2.8 6 1.8 4.5 1.5"
          stroke="#1B5E20" stroke-width="0.55" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ── Horizontal gold divider ── -->
  <line x1="160" y1="595" x2="840" y2="595"
        stroke="#FFB800" stroke-width="1" opacity="0.25"/>

  <!-- ── "Mango" wordmark ── -->
  <text
    x="500" y="730"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="145"
    font-weight="900"
    letter-spacing="-5"
    fill="#FFFFFF"
  >Mango</text>

  <!-- ── Tagline ── -->
  <text
    x="500" y="782"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="21"
    font-weight="500"
    letter-spacing="10"
    fill="#FFB800"
  >3D SHAPE EXPLORER</text>
</svg>
