<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0E0C18"/>
      <stop offset="100%" stop-color="#1C1828"/>
    </linearGradient>

    <!-- Mango fruit gradient (objectBoundingBox so it survives the scale transform) -->
    <linearGradient id="mango" x1="0.85" y1="0.02" x2="0.15" y2="0.98">
      <stop offset="0%"   stop-color="#B71C1C"/>
      <stop offset="38%"  stop-color="#E64A19"/>
      <stop offset="72%"  stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </linearGradient>

    <!-- Warm radial glow behind the mark -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFB800" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- ── Decorative wireframe shapes (very faint) ── -->
  <!-- Box, top-right -->
  <g opacity="0.07" stroke="#FFB800" stroke-width="1.5" fill="none">
    <polygon points="1390,45 1465,84 1465,194 1390,233 1315,194 1315,84"/>
    <line x1="1390" y1="45"  x2="1390" y2="233"/>
    <line x1="1315" y1="84"  x2="1465" y2="84"/>
  </g>
  <!-- Torus, bottom-left -->
  <g opacity="0.07" stroke="#FFB800" fill="none" transform="rotate(-18 90 445)">
    <ellipse cx="90" cy="445" rx="78" ry="20" stroke-width="2"/>
    <ellipse cx="90" cy="445" rx="42" ry="11" stroke-width="1.4"/>
  </g>
  <!-- Sphere, top-centre-right -->
  <g opacity="0.06" stroke="#FFB800" fill="none">
    <circle cx="870" cy="52" r="42" stroke-width="1.4"/>
    <ellipse cx="870" cy="52" rx="18" ry="42" stroke-width="1"/>
    <ellipse cx="870" cy="52" rx="42" ry="14" stroke-width="1"/>
  </g>
  <!-- Cone, bottom-right -->
  <g opacity="0.06" stroke="#FFB800" fill="none">
    <line x1="1210" y1="420" x2="1160" y2="500" stroke-width="1.4"/>
    <line x1="1210" y1="420" x2="1260" y2="500" stroke-width="1.4"/>
    <ellipse cx="1210" cy="497" rx="50" ry="12" stroke-width="1.2"/>
  </g>

  <!-- ── Warm glow behind mango mark ── -->
  <ellipse cx="370" cy="250" rx="260" ry="260" fill="url(#glow)"/>

  <!-- ── Large Mango Mark ── -->
  <!-- Original viewBox 0 0 20 24, scaled ×15.                  -->
  <!-- Fruit body centre ≈ (10, 12.25) → at scale15: (150,184). -->
  <!-- translate so that centre lands at (370, 250):             -->
  <!-- tx = 370-150=220,  ty = 250-184=66                       -->
  <g transform="translate(220, 66) scale(15)">
    <!-- Fruit body -->
    <path d="M10 4C13.5 4 16 7.5 16 12C16 17 13.5 20 10 20.5C6.5 20 4 17 4 12C4 7.5 6.5 4 10 4Z"
          fill="url(#mango)"/>
    <!-- Sheen highlight -->
    <ellipse cx="8.3" cy="9.8" rx="1.8" ry="2.6" fill="white" opacity="0.2"/>
    <!-- Stem -->
    <path d="M10 4C10 2.5 11.1 1.7 12.6 2.2"
          stroke="#2D7A3A" stroke-width="1.3" stroke-linecap="round" fill="none"/>
    <!-- Leaf -->
    <path d="M10 4C9.2 2 6.5 0.5 4.5 1.5C5.5 3.5 7.5 3.8 10 4Z" fill="#2D7A3A"/>
    <!-- Leaf midrib -->
    <path d="M9.7 3.8C8 2.8 6 1.8 4.5 1.5"
          stroke="#1B5E20" stroke-width="0.55" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ── Vertical gold divider ── -->
  <line x1="600" y1="130" x2="600" y2="370"
        stroke="#FFB800" stroke-width="1" opacity="0.25"/>

  <!-- ── "Mango" wordmark ── -->
  <text
    x="656" y="310"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="190"
    font-weight="900"
    letter-spacing="-6"
    fill="#FFFFFF"
  >Mango</text>

  <!-- ── Tagline ── -->
  <text
    x="662" y="356"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="500"
    letter-spacing="9"
    fill="#FFB800"
  >3D SHAPE EXPLORER</text>
</svg>
